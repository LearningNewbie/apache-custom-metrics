apiVersion: v1
kind: Service
metadata:
  name: php-service-{{.Replica}}
  namespace: ns-{{.Replica}}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  labels:
    app: apache
    release: prometheus
    kube-burner-job: hpa
spec:
  selector:
    app: apache
    release: prometheus
  type: LoadBalancer
  loadBalancerClass: service.k8s.aws/nlb
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80