kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  labels:
    release: prometheus
    app: apache
  name: hpa-php-apache-{{.Replica}}
  namespace: ns-{{.Replica}}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: php-deployment-{{.Replica}}
  minReplicas: 1
  maxReplicas: 10
  metrics:
  # use a "Pods" metric, which takes the average of the given metric across all pods controlled by the autoscaling target
  - type: Pods
    pods:
      metric:
        # use the metric that you used above: pods/http_requests
        name: apache_cpuload
      target:
        # target 500 milli-requests per second, which is 1 request every two seconds
        type: AverageValue
        averageValue: 500m